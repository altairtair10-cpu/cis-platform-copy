{% extends "base.html" %}
{% block title %}{{ _('Аттестация') }}{% endblock %}
{% block page_title %}{{ _('Аттестация') }} — {{ emp.full_name_ru }}{% endblock %}

{% block content %}
<form method="POST" action="{{ url_for('hr.attestation_create', emp_id=emp.id) }}" style="max-width:640px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card">
    <div class="card-body">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 18px">
        <div class="form-group">
          <label class="form-label">{{ _('Дата аттестации') }}</label>
          <input name="att_date" type="date" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">{{ _('№ протокола') }}</label>
          <input name="protocol_number" class="form-input">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">{{ _('Состав комиссии') }}</label>
        <textarea name="commission" class="form-textarea" style="min-height:60px"
                  placeholder="{{ _('Председатель, члены комиссии') }}"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">{{ _('Результат') }}</label>
        <select name="result" class="form-select">
          <option value="">{{ _('— выбрать —') }}</option>
          {% for r in results %}<option value="{{ r }}">{{ _(r) }}</option>{% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">{{ _('Рекомендация') }}</label>
        <textarea name="recommendation" class="form-textarea" style="min-height:60px"></textarea>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">{{ _('Дата повторной проверки (если требуется)') }}</label>
        <input name="recheck_date" type="date" class="form-input" style="max-width:200px">
      </div>
    </div>
  </div>
  <div style="margin-top:14px;display:flex;gap:8px">
    <button type="submit" class="btn btn-primary"><i class="ti ti-device-floppy"></i> {{ _('Сохранить') }}</button>
    <a href="{{ url_for('hr.employee_card', emp_id=emp.id) }}" class="btn"><i class="ti ti-x"></i> {{ _('Отмена') }}</a>
  </div>
</form>
{% endblock %}
