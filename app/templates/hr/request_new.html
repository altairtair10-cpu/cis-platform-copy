{% extends "base.html" %}
{% block title %}Подать заявление{% endblock %}
{% block page_title %}Подать заявление{% endblock %}

{% block content %}
<form method="POST" action="{{ url_for('hr.request_submit') }}" enctype="multipart/form-data" style="max-width:640px">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="card">
    <div class="card-body">
      <div class="form-group">
        <label class="form-label">Вид заявления<span class="req">*</span></label>
        <select name="kind" class="form-select" onchange="this.form.querySelectorAll('.leave-only').forEach(el=>el.style.display=this.value==='leave'?'':'none')">
          {% for key, label in kinds.items() %}
          <option value="{{ key }}" {% if key == kind %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group leave-only" style="{% if kind != 'leave' %}display:none{% endif %}">
        <label class="form-label">Дата начала (для отпуска)</label>
        <input name="period_from" type="date" class="form-input" style="max-width:200px">
      </div>

      <div class="form-group">
        <label class="form-label">Суть заявления<span class="req">*</span></label>
        <input name="summary" class="form-input" required
               placeholder="напр. «Прошу предоставить отпуск с ... по ...»">
      </div>

      <div class="form-group">
        <label class="form-label">Подробности (необязательно)</label>
        <textarea name="details" class="form-textarea" style="min-height:80px"
                  placeholder="Дополнительная информация"></textarea>
      </div>

      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Вложение (необязательно)</label>
        <label for="attachments" class="btn"><i class="ti ti-upload"></i> Загрузить
          <input id="attachments" name="attachments" type="file" multiple style="display:none"></label>
      </div>
    </div>
  </div>

  <div style="margin-top:14px;display:flex;gap:8px">
    <button type="submit" class="btn btn-primary"><i class="ti ti-send"></i> Подать</button>
    <a href="{{ url_for('hr.my_requests') }}" class="btn"><i class="ti ti-x"></i> Отмена</a>
  </div>
  <div style="font-size:11px;color:var(--text-3);margin-top:10px">
    Заявление уйдёт вашему руководителю на согласование. После согласования кадровая
    служба оформит соответствующий приказ.
  </div>
</form>
{% endblock %}
