{% extends "base.html" %}
{% block title %}New Leave Request{% endblock %}
{% block page_title %}{{ _('Новая заявка на отпуск') }}{% endblock %}

{% block content %}
<div class="card" style="max-width:600px;">
  <div class="card-header">
    <div class="card-header-left">
      <div class="card-icon"><i class="ti ti-calendar-plus"></i></div>
      <div class="card-title">{{ _('Заявка на отпуск') }}</div>
    </div>
  </div>

  <div style="padding:20px;">
    <form method="post" action="{{ url_for('hr.pto_new') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div style="margin-bottom:16px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;color:var(--text-1);">
          {{ _('Тип отпуска') }}
        </label>
        <select name="leave_type" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-2);color:var(--text-1);">
          <option value="annual">{{ _('Ежегодный') }}</option>
          <option value="sick">{{ _('Больничный') }}</option>
          <option value="unpaid">{{ _('За свой счёт') }}</option>
          <option value="other">{{ _('Другое') }}</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;">
        <div>
          <label style="display:block;margin-bottom:6px;font-weight:500;color:var(--text-1);">
            {{ _('Дата начала') }}
          </label>
          <input type="date" name="start_date" required
            style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-2);color:var(--text-1);">
        </div>
        <div>
          <label style="display:block;margin-bottom:6px;font-weight:500;color:var(--text-1);">
            {{ _('Дата окончания') }}
          </label>
          <input type="date" name="end_date" required
            style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-2);color:var(--text-1);">
        </div>
      </div>

      <div style="margin-bottom:24px;">
        <label style="display:block;margin-bottom:6px;font-weight:500;color:var(--text-1);">
          {{ _('Причина') }}
        </label>
        <textarea name="reason" rows="3"
          placeholder="{{ _('Укажите причину...') }}"
          style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;background:var(--bg-2);color:var(--text-1);resize:vertical;"></textarea>
      </div>

      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary">
          {{ _('Отправить') }}
        </button>
        <a href="{{ url_for('hr.pto') }}" class="btn btn-secondary">
          {{ _('Отмена') }}
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
