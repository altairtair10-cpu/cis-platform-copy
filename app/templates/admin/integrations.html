{% extends "base.html" %}
{% block title %}{{ _('Интеграции') }}{% endblock %}
{% block page_title %}{{ _('Интеграции') }}{% endblock %}

{% block content %}
<div class="card" style="max-width:640px">
  <div class="card-body">
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        {{ _('URL дэшборда техники (страница «Дэшборд техники» показывает его во фрейме; пусто = раздел скрыт до настройки)') }}
      </label>
      <input type="url" name="equipment_dashboard_url" class="form-input"
             value="{{ equipment_dashboard_url }}" placeholder="https://..."
             style="margin-bottom:16px">
      <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        {{ _('ID Google-таблицы учёта техники (из адреса таблицы: /spreadsheets/d/<ID>/...). Не забудьте открыть таблице доступ на чтение для сервисного аккаунта.') }}
      </label>
      <input type="text" name="equipment_spreadsheet_id" class="form-input"
             value="{{ equipment_spreadsheet_id }}" placeholder="1AbC...xyz" style="margin-bottom:16px">

      <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        {{ _('Название вкладки с базой техники') }}
      </label>
      <input type="text" name="equipment_sheet_name" class="form-input"
             value="{{ equipment_sheet_name }}" placeholder="База" style="margin-bottom:16px">

      <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        {{ _('ID Google-таблицы реестра ТО и ремонтов (вкладки по каждой машине). Не забудьте расшарить её на сервисный аккаунт.') }}
      </label>
      <input type="text" name="maintenance_spreadsheet_id" class="form-input"
             value="{{ maintenance_spreadsheet_id }}" placeholder="1xnEY...F7M4" style="margin-bottom:16px">

      <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        {{ _('ID Google-таблицы оплат (финансовый отдел вносит номера оплаченных ПО; система сама переводит их в «Оплачен»)') }}
      </label>
      <input type="text" name="payments_spreadsheet_id" class="form-input"
             value="{{ payments_spreadsheet_id }}" placeholder="1AbC...xyz" style="margin-bottom:10px">
      <input type="text" name="payments_sheet_name" class="form-input"
             value="{{ payments_sheet_name }}" placeholder="{{ _('Название вкладки (пусто = первая)') }}" style="margin-bottom:16px;max-width:300px">

      <button type="submit" class="btn btn-primary">
        {{ _('Сохранить') }}
      </button>
    </form>
  </div>
</div>
{% endblock %}
