{% extends "base.html" %}
{% block title %}{{ _('Брендинг') }}{% endblock %}
{% block page_title %}{{ _('Брендинг') }}{% endblock %}

{% block content %}
<div class="card" style="max-width:560px">
  <div class="card-body">
    <form method="POST" enctype="multipart/form-data">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        {{ _('Название компании') }}
      </label>
      <input type="text" name="company_name" class="form-input" value="{{ company_name }}" style="margin-bottom:16px">

      <label style="display:block;font-size:12px;color:var(--color-text-secondary);margin-bottom:4px">
        {{ _('Логотип (PNG, JPG, SVG, WEBP)') }}
      </label>
      {% if logo_set %}
      <div style="margin-bottom:10px;padding:12px;background:var(--color-background-secondary);border-radius:8px;display:inline-block">
        <img src="{{ url_for('admin.logo') }}" alt="logo" style="max-height:48px">
      </div>
      {% endif %}
      <input type="file" name="logo" accept=".png,.jpg,.jpeg,.svg,.webp" style="margin-bottom:16px;display:block">

      <button type="submit" class="btn btn-primary">
        {{ _('Сохранить') }}
      </button>
    </form>

    {% if logo_set %}
    <form method="POST" action="{{ url_for('admin.remove_logo') }}" style="margin-top:12px">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <button type="submit" class="btn btn-sm">
        {{ _('Убрать логотип (вернуть стандартный)') }}
      </button>
    </form>
    {% endif %}
  </div>
</div>
{% endblock %}
