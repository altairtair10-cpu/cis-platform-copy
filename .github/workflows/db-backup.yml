name: Nightly DB backup

on:
  schedule:
    - cron: '0 1 * * *'    # 01:00 UTC = 06:00 Atyrau, daily
  workflow_dispatch:        # allows manual run from the Actions tab

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Dump database (pg_dump via postgres:18 image)
        run: |
          docker run --rm -e DATABASE_URL postgres:18 \
            sh -c 'pg_dump "$DATABASE_URL" --format=custom --no-owner' > backup.dump
          test -s backup.dump || { echo "Dump is empty — failing"; exit 1; }
          ls -la backup.dump
        env:
          DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}

      - name: Encrypt dump
        run: |
          openssl enc -aes-256-cbc -pbkdf2 -salt \
            -in backup.dump -out backup.dump.enc -pass env:PASSPHRASE
          rm backup.dump
        env:
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}

      - name: Upload encrypted backup (kept 30 days)
        uses: actions/upload-artifact@v4
        with:
          name: cis-db-backup-${{ github.run_number }}
          path: backup.dump.enc
          retention-days: 30
